<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Apple Sign In</title>
</head>
<body>
<script>
(function() {
  try {
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const userStr = params.get('user');
    const error = params.get('error');
    if (window.opener && !window.opener.closed) {
      if (error) {
        window.opener.postMessage({ type: 'apple-auth', error }, window.location.origin);
      } else if (token) {
        const user = userStr ? JSON.parse(decodeURIComponent(userStr)) : null;
        window.opener.postMessage({ type: 'apple-auth', payload: { token, user } }, window.location.origin);
      } else {
        window.opener.postMessage({ type: 'apple-auth', error: 'No token received' }, window.location.origin);
      }
    }
  } catch (e) {
    try { window.opener.postMessage({ type: 'apple-auth', error: String(e) }, window.location.origin); } catch(_) {}
  }
  setTimeout(function() { window.close(); }, 500);
})();
</script>
</body>
</html>
