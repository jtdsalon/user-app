<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Google OAuth Callback</title>
</head>
<body>
<script>
(function() {
  try {
    // Parse hash fragment parameters (id_token, access_token, etc.)
    const hash = window.location.hash.substring(1);
    const params = Object.fromEntries(hash.split('&').map(p => p.split('=').map(decodeURIComponent)));
    // Send token back to opener
    if (window.opener && !window.opener.closed) {
      window.opener.postMessage({ type: 'google-auth', payload: params }, window.location.origin);
    }
  } catch (e) {
    try { window.opener.postMessage({ type: 'google-auth', error: String(e) }, window.location.origin); } catch(e){}
  }
  // Close popup after a short delay
  setTimeout(() => window.close(), 500);
})();
</script>
</body>
</html>
